services:
  postgres:
    image: postgres:16-alpine
    container_name: bazz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bazz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bazz_secret}
      POSTGRES_DB: ${POSTGRES_DB:-bazz_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bazz']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bazz_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
