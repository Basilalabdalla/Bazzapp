name: bazz_app
description: BazZ B2B Delivery Platform

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  go_router: ^14.0.0
  provider: ^6.1.2
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  intl: ^0.20.2
  http: ^1.2.1
  flutter_secure_storage: ^9.2.2
  web_socket_channel: ^3.0.1
  font_awesome_flutter: ^10.7.0
  local_auth: ^2.3.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A3C6E"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/