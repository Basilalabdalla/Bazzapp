# ============================================
# BazZ — Validate PILOT build (Railway)
# ============================================
# Railway automatically deploys on push to: develop
# This workflow validates the build so you catch errors before Railway picks it up.

name: Validate → Pilot (Railway)

on:
  push:
    branches: [develop]
    paths:
      - 'apps/api/**'
      - 'apps/admin/**'
      - '.github/workflows/deploy-dev.yml'

jobs:
  validate:
    name: Validate build
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup pnpm ────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      # ── 3. Setup Node ────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # ── 4. Install deps ──────────────────────
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # ── 5. Build API ─────────────────────────
      - name: Build API
        run: pnpm --filter server build

      # ── 6. Build Admin console ───────────────
      - name: Build Admin console
        run: pnpm --filter admin build
        env:
          VITE_API_URL: https://bazz-pilot.up.railway.app
          VITE_WS_URL: wss://bazz-pilot.up.railway.app

      - name: Summary
        run: echo "✅ Build validated — Railway will deploy automatically"
