# ============================================
# BazZ API — Deploy to PRODUCTION (AWS ECS)
# ============================================
# Triggers on push to: main  →  api.bazzmarket.com
# Dev/test uses Railway (develop branch) — no AWS action needed for dev

name: Deploy API → Production

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/deploy-prod.yml'

env:
  ECS_CLUSTER: bazz-cluster
  ECS_SERVICE: bazz-prod-service
  CONTAINER_NAME: bazz-api
  IMAGE_TAG: latest

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    environment: production   # Requires manual approval in GitHub if configured

    # Required for OIDC — lets GitHub request a token from AWS
    permissions:
      id-token: write   # Request JWT from GitHub's OIDC provider
      contents: read    # Checkout the repo

    steps:
      # ── 1. Checkout ──────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials (OIDC — no keys stored) ─────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 3. Login to ECR ───────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build & push Docker image ──────────
      - name: Build, tag, and push image to ECR
        id: build-image
        working-directory: apps/api
        run: |
          IMAGE_URI="${{ secrets.ECR_REPOSITORY }}:latest"
          # Also tag with git SHA for traceability
          SHA_URI="${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}"
          docker build -t $IMAGE_URI -t $SHA_URI .
          docker push $IMAGE_URI
          docker push $SHA_URI
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "sha_image=$SHA_URI" >> $GITHUB_OUTPUT

      # ── 5. Update ECS service (rolling deploy) ─
      - name: Deploy to ECS (rolling update)
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --deployment-configuration "maximumPercent=200,minimumHealthyPercent=100"

      # ── 6. Wait for deployment (zero downtime) ─
      - name: Wait for stable deployment
        timeout-minutes: 10
        run: |
          echo "Waiting for ECS service to stabilise..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.bazzmarket.com/health)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production deployment complete! (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i/20 — HTTP $STATUS — waiting 15s..."
            sleep 15
          done
          echo "❌ Deployment did not stabilise in time"
          exit 1

      # ── 7. Summary ────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "🚀 Production deploy successful"
          echo "   Image: ${{ secrets.ECR_REPOSITORY }}:latest"
          echo "   SHA:   ${{ github.sha }}"
          echo "   URL:   https://api.bazzmarket.com"
